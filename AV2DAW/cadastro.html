<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO V - Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">STUDIO V</a></div>
        <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
    </header>

    <nav id="menuPrincipal" class="menu-dropdown">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Serviços</a></li>
        </ul>
    </nav>

    <main class="container-cadastro">
        <div class="form-box">
            <h2>Criar Conta</h2>
            <p>Faça seu cadastro para agendar horários.</p>
            
            <form id="formCadastro">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" maxlength="14" required placeholder="000.000.000-00">
                </div>

                <div class="input-group">
                    <label for="nascimento">Data de Nascimento</label>
                    <input type="date" id="nascimento" name="nascimento" required>
                </div>

                <div class="input-group">
                    <label for="cartao">Cartão de Crédito/Débito</label>
                    <input type="text" id="cartao" name="cartao" required placeholder="Número do Cartão">
                </div>

                <button type="button" class="btn-submit" onclick="enviarCadastro()">Cadastrar</button>
            </form>

            <div id="resultado" class="mensagem-resultado"></div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
