<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agendar Serviços</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">STUDIO V</a></div>
    </header>

    <main>
        <h2 style="text-align: center; margin-top: 20px;">Serviços para o cabelo</h2>

        <div class="servico-card" onclick="expandirProfissionais(this)">
            <div class="servico-info">
                <h4>CORTAR CABELO</h4>
                <p>Tempo de duração: 45 minutos</p>
                <p>Valor: R$30,00</p>
                
                <div class="profissionais-opcoes">
                    <p style="margin-bottom: 10px; color: #fff;">Escolha o profissional:</p>
                    <button class="btn-profissional" onclick="event.stopPropagation(); escolherProfissional()">José</button>
                    <button class="btn-profissional" onclick="event.stopPropagation(); escolherProfissional()">Qualquer</button>
                </div>
            </div>
        </div>
        
        <div class="servico-card" onclick="expandirProfissionais(this)">
            <div class="servico-info">
                <h4>PINTAR CABELO</h4>
                <p>Tempo de duração: 1 hr e 30 min</p>
                <p>Valor: R$80,00</p>
                
                <div class="profissionais-opcoes">
                    <p style="margin-bottom: 10px; color: #fff;">Escolha o profissional:</p>
                    <button class="btn-profissional" onclick="event.stopPropagation(); escolherProfissional()">José</button>
                    <button class="btn-profissional" onclick="event.stopPropagation(); escolherProfissional()">Qualquer</button>
                </div>
            </div>
        </div>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
