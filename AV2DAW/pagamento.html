<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Agendamento</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: #f4f4f4;">
    <header><div class="logo"><a href="index.html" style="color:inherit; text-decoration:none;">STUDIO V</a></div></header>

    <main id="resumoPagamento" style="display: flex; justify-content: center; padding: 40px;">
        <div style="background-color: #2c2c2c; width: 400px; padding: 30px; border-radius: 10px; color: white;">
            
            <h2 style="text-align: center; margin-bottom: 20px;">Finalizar Agendamento</h2>
            
            <div style="background-color: white; color: black; padding: 15px; margin-bottom: 20px; border-radius: 5px;">
                <h4 style="color: blue;">Detalhes do agendamento:</h4>
                
                <div id="resumoTexto"></div>
                
                <hr style="margin: 10px 0;">
                <h3 style="color: blue; display: flex; justify-content: space-between;">
                    <span>Total:</span> <span id="resumoValor"></span>
                </h3>
            </div>

            <div style="background-color: white; color: black; padding: 15px; margin-bottom: 20px; border-radius: 5px;">
                <p style="color: blue; font-weight: bold;">Parabéns! Você está ganhando pontos por este agendamento!</p>
                <label><input type="checkbox"> Deseja usar seus pontos (0) para resgatar cupons?</label>
                <p style="margin-top: 10px;">Digite seu cupom:</p>
                <input type="text" style="width: 100%; padding: 8px; background-color: #ccc; border: none; border-radius: 3px;">
            </div>

            <label style="display: block; margin-bottom: 20px;">
                <input type="checkbox"> O agendamento é para outra pessoa?
            </label>

            <p style="font-size: 12px; margin-bottom: 10px; color: #ccc;">Cancelamento somente com 3 dias de antecedência e o valor será transformado em pontos.</p>
            <label style="display: block; margin-bottom: 20px;">
                <input type="checkbox" id="aceitarTermos" required> Li os termos e concordo com eles.
            </label>

            <select id="formaPagamento" style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 5px;">
                <option value="pix">Pix</option>
                <option value="cartao">Cartão de Crédito/Débito</option>
            </select>

            <button id="btnPagar" onclick="confirmarPagamento()" style="width: 100%; background-color: #009ce8; color: white; border: none; padding: 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 16px;">Pagar</button>
        </div>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
